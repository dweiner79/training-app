<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HLS New Hire Training</title>
    <script>
      // SPA fallback for GitHub Pages: encode the full path into a query param
      // and redirect to index.html which will restore it via history.replaceState.
      var base = '/training-app';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin + base + '/?p=' + encodeURIComponent(path + search) + hash
      );
    </script>
  </head>
  <body></body>
</html>
