<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/hls-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HLS New Hire Training</title>
    <script>
      // Handle SPA redirect from 404.html (GitHub Pages deep-link workaround)
      (function () {
        var search = window.location.search;
        if (search.startsWith('?p=')) {
          var path = decodeURIComponent(search.slice(3));
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, null, base + (path || '/'));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
